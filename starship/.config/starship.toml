add_newline = true

format = """\
[≤▒ηυ ](lavender)[ΌΓ╛](teal)$os$username$sudo\
[έΨΥέΨΤέΨΣ](fg:teal bg:sapphire)$directory\
[έΨΥέΨΤέΨΣ](fg:sapphire bg:blue)$nix_shell$cmd_duration$status\
[ΌΓ╕ ](blue)[≤░χψ  ](yellow)$fill[  ΌΛδ ](red)\
[ ΌΓ║](flamingo)$git_branch$git_status\
[έΨΥέΨΤέΨΣ](fg:flamingo bg:yellow)$c$deno$goland$java$lua$nim$nodejs$ruby$rust$php$python\
[έΨΥέΨΤέΨΣ](fg:yellow bg:maroon)$package\
[έΨΥέΨΤέΨΣ](fg:maroon bg:mauve)$time\
[ΌΓ╝](mauve)
[≤▒ης ](lavender)$character\
"""

palette = "catppuccin_frappe"

[palettes.catppuccin_frappe]
rosewater = "#f2d5cf"
flamingo = "#eebebe"
pink = "#f4b8e4"
mauve = "#ca9ee6"
red = "#e78284"
maroon = "#ea999c"
peach = "#ef9f76"
yellow = "#e5c890"
green = "#a6d189"
teal = "#81c8be"
sky = "#99d1db"
sapphire = "#85c1dc"
blue = "#8caaee"
lavender = "#babbf1"
text = "#c6d0f5"
subtext1 = "#b5bfe2"
subtext0 = "#a5adce"
overlay2 = "#949cbb"
overlay1 = "#838ba7"
overlay0 = "#737994"
surface2 = "#626880"
surface1 = "#51576d"
surface0 = "#414559"
base = "#303446"
mantle = "#292c3c"
crust = "#232634"

[os]
style = "fg:crust bg:teal"
disabled = false
symbols = { Arch = "ΎΝΔ ", NixOS = "≤▒ΕΖ " }

[username]
disabled = false
show_always = true
style_user = "fg:crust bg:teal"
style_root = "fg:crust bg:teal"
format = "[$user]($style)"

[sudo]
disabled = false
symbol = "ΎΜ╝ "
style = "fg:crust bg:teal"
format = "[$symbol]($style)"

[directory]
style = "fg:crust bg:sapphire bold"
format = "[$path]($style)"
truncation_length = 4
truncation_symbol = "έΑο/"
truncate_to_repo = false

[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "ΎΑΒ "
"Pictures" = "ΎΑ╛ "
"~" = "ΎΑΧ "

[nix_shell]
format = "[ ≤▒ΕΖ $name]($style)"
style = "fg:crust bg:blue bold"

[cmd_duration]
format = "[ ΎΚΤ $duration]($style)"
style = "fg:crust bg:blue bold"

[status]
disabled = false
symbol = "[ ΌςΘ ](fg:red bg:blue)"
success_symbol = "[ ≤░Ωκ ](fg:green bg:blue)"
success_style = "fg:green bg:blue"
failure_style = "fg:red bg:blue"
format = "$symbol([$status]($style))"

[git_branch]
symbol = "ΎΡα"
style = "fg:crust bg:flamingo italic"
format = "[$symbol $branch]($style)"

[git_status]
style = "fg:crust bg:flamingo italic"
format = "[$all_status$ahead_behind]($style)"

[c]
symbol = "Όαη"
style = "fg:crust bg:yellow"
format = "[$symbol $version]($style)"

[deno]
symbol = "ΏθοΨ"
style = "fg:crust bg:yellow"
format = "[$symbol $version]($style)"

[golang]
symbol = "Όαπ "
style = "fg:crust bg:yellow"
format = "[$symbol $version]($style)"

[java]
symbol = "ΌΚΨ"
style = "fg:crust bg:yellow"
format = "[$symbol $version]($style)"

[php]
symbol = "ΌαΙ"
style = "fg:crust bg:yellow"
format = "[$symbol $version]($style)"

[python]
symbol = "ΌΙ╡"
style = "fg:crust bg:yellow"
format = "[$symbol $version]($style)"

[lua]
symbol = "Όαι"
style = "fg:crust bg:yellow"
format = "[$symbol $version]($style)"

[nim]
symbol = "≤░Ηξ"
style = "fg:crust bg:yellow"
format = "[$symbol $version]($style)"

[nodejs]
symbol = "Όεα"
style = "fg:crust bg:yellow"
format = "[$symbol $version]($style)"

[ruby]
symbol = "ΌηΣ"
style = "fg:crust bg:yellow"
format = "[$symbol $version]($style)"

[rust]
symbol = "Όηρ"
style = "fg:crust bg:yellow"
format = "[$symbol $version]($style)"

[package]
symbol = "≤░ΠΩ "
format = "[$symbol$version]($style)"
style = "fg:crust bg:maroon"

[fill]
symbol = "≤░Λι  "
style = "lavender bold"

[time]
disabled = false
time_format = "%I:%M%p"
style = "fg:crust bg:mauve bold"
format = "[ΌβΒ $time]($style)"

[character]
success_symbol = "[ΌθΖ](teal) [I](bold fg:base bg:green)"
error_symbol = "[ΌθΖ](teal) [I](bold fg:base bg:green)"
vimcmd_symbol = "[ΌθΖ](teal) [N](bold fg:base bg:blue)"
vimcmd_visual_symbol = "[ΌθΖ](teal) [V](bold fg:base bg:mauve)"
vimcmd_replace_one_symbol = "[ΌθΖ](teal) [R](bold fg:base bg:red)"
